<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="../css/styles.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .dashed-line {
        background-image: linear-gradient(to right, #e0e0dc 50%, rgba(255,255,255,0) 0%);
        background-position: bottom;
        background-size: 8px 1px;
        background-repeat: repeat-x;
      }
      .fern-overlay {
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3Base%3Cpath d='M50 10 C 55 30 75 40 90 50 C 75 60 55 70 50 90 C 45 70 25 60 10 50 C 25 40 45 30 50 10' fill='none' stroke='%230a0a0a' stroke-width='0.5' opacity='0.06'/%3E%3C/svg%3E");
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-32">
<!-- Top AppBar -->
<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl h-16 pl-2">
  <div class="flex justify-between items-center h-full p-6 max-w-4xl mx-auto w-full">
  <div class="flex items-center gap-4">
  <span class="material-symbols-outlined text-neutral-950" data-icon="menu">menu</span>
  <span class="font-serif font-bold text-neutral-950 text-2xl tracking-tight">tapara</span>
  </div>
  </div>
</nav>
<main class="pt-24 px-6 max-w-2xl mx-auto relative overflow-hidden">
<!-- Background Texture -->
<div class="absolute inset-0 fern-overlay pointer-events-none opacity-40"></div>
<!-- Header Section -->
<section class="relative z-10 mb-10">
<h2 class="font-serif text-5xl font-bold tracking-tight text-primary mb-8">Vouchers</h2>
<div class="flex items-center gap-3 mb-6">
<span class="font-sans text-sm font-bold uppercase tracking-widest text-primary">Active</span>
<span class="bg-primary text-white text-[10px] px-2 py-0.5 rounded-full font-bold">2</span>
</div>
</section>
<!-- Voucher List: Active -->
<div class="space-y-6 relative z-10">
<!-- Voucher 1 -->
<div class="bg-white border border-outline-variant rounded-2xl overflow-hidden shadow-[0_12px_40px_rgba(10,10,10,0.04)] hover:scale-[1.01] transition-transform duration-300">
<div class="p-6 flex justify-between items-start">
<div class="space-y-1">
<p class="font-sans text-[10px] uppercase tracking-[0.1em] text-outline font-semibold">Morning Ritual</p>
<h3 class="font-serif text-3xl font-regular text-primary">Free flat white</h3>
</div>
<div class="w-12 h-12 bg-surface-container-low rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary">coffee</span>
</div>
</div>
<!-- Tear-off line -->
<div class="px-6 h-px">
<div class="w-full dashed-line h-px opacity-60"></div>
</div>
<div class="bg-surface-container-low px-6 py-4 flex justify-between items-center">
<span class="font-sans text-xs text-outline italic">Expires 24 Oct 2024</span>
<button class="font-sans text-[11px] font-bold uppercase tracking-widest text-primary hover:opacity-60 transition-opacity">Redeem Now</button>
</div>
</div>
<!-- Voucher 2 -->
<div class="bg-white border border-outline-variant rounded-2xl overflow-hidden shadow-[0_12px_40px_rgba(10,10,10,0.04)] hover:scale-[1.01] transition-transform duration-300">
<div class="p-6 flex justify-between items-start">
<div class="space-y-1">
<p class="font-sans text-[10px] uppercase tracking-[0.1em] text-outline font-semibold">Artisan Goods</p>
<h3 class="font-serif text-3xl font-regular text-primary">10% off</h3>
</div>
<div class="w-12 h-12 bg-surface-container-low rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary">shopping_bag</span>
</div>
</div>
<!-- Tear-off line -->
<div class="px-6 h-px">
<div class="w-full dashed-line h-px opacity-60"></div>
</div>
<div class="bg-surface-container-low px-6 py-4 flex justify-between items-center">
<span class="font-sans text-xs text-outline italic">Expires 02 Nov 2024</span>
<button class="font-sans text-[11px] font-bold uppercase tracking-widest text-primary hover:opacity-60 transition-opacity">Redeem Now</button>
</div>
</div>
</div>
<!-- Expired Section -->
<section class="mt-16 mb-8 relative z-10 opacity-60">
<div class="flex items-center gap-3 mb-6">
<span class="font-sans text-sm font-bold uppercase tracking-widest text-outline">Expired</span>
</div>
<div class="bg-surface-container-low/50 border border-outline-variant/50 rounded-2xl p-6 flex justify-between items-center">
<div>
<p class="font-sans text-[10px] uppercase tracking-[0.1em] text-outline font-semibold">Community Lunch</p>
<h4 class="font-serif text-xl text-outline italic">Lunch for two</h4>
</div>
<span class="material-symbols-outlined text-outline">lock</span>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-white/80 dark:bg-black/80 backdrop-blur-xl border-t border-neutral-100 dark:border-neutral-900 flex justify-around items-center pt-3 pb-8 px-4">
  <a class="flex flex-col items-center justify-center text-neutral-400 dark:text-neutral-600 hover:text-neutral-600 dark:hover:text-neutral-300" href="#">
    <span class="material-symbols-outlined">home_app_logo</span>
    <span class="font-sans text-[10px] uppercase tracking-[0.05em] font-medium mt-1">Home</span>
    </a>
  <a class="flex flex-col items-center justify-center text-neutral-400 dark:text-neutral-600 hover:text-neutral-600 dark:hover:text-neutral-300" href="#">
  <span class="material-symbols-outlined">receipt_long</span>
  <span class="font-sans text-[10px] uppercase tracking-[0.05em] font-medium mt-1">Activity</span>
  </a>
  <a class="flex flex-col items-center justify-center text-neutral-950 dark:text-neutral-50 font-bold active:scale-90 transition-all" href="#">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">loyalty</span>
    <span class="font-sans text-[10px] uppercase tracking-[0.05em] font-medium mt-1">loyalty</span>
  </a>
  <!-- Active Tab: Admin/Analytics Mapping -->
  <a class="flex flex-col items-center justify-center text-neutral-400 dark:text-neutral-600 hover:text-neutral-600 dark:hover:text-neutral-300" href="#">
    <span class="material-symbols-outlined">group_work</span>
    <span class="font-sans text-[10px] uppercase tracking-[0.05em] font-medium mt-1">Admin</span>
  </a>
</nav>
</body></html>
